<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Country Timezone Selector</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>World Clock</h1>
        
        <div class="clock-display-section">
            <div id="clock" class="clock">00:00:00</div>
        </div>

        <div class="controls-section">
            <label for="country-select" class="label">Select Country:</label>
            <select id="country-select" class="dropdown">
                <option value="">-- Choose a Country --</option>
            </select>
        </div>

        <div class="timezone-section">
            <p>Timezone: <span id="timezone-label">--</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
